# ══════════════════════════════════════════════════════════════════
# CD Pipeline — API Orchestration Platform
# ══════════════════════════════════════════════════════════════════
# Builds and publishes Docker images to GitHub Container Registry
# on version tags (v*) and main branch pushes.
# ══════════════════════════════════════════════════════════════════

name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── Build & Publish Docker Image ──────────────────────────────
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata for tags and labels
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and push multi-platform image
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── Deploy (Staging) ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "══════════════════════════════════════════"
          echo "  Deploying to staging environment"
          echo "  Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "══════════════════════════════════════════"
          # ponytail: placeholder for actual deployment command
          # Replace with: kubectl set image, docker compose pull, ssh deploy, etc.
          echo "Deploy command goes here (e.g., docker compose pull && docker compose up -d)"

  # ─── Deploy (Production) ──────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "══════════════════════════════════════════"
          echo "  Deploying to production environment"
          echo "  Tag: ${{ github.ref_name }}"
          echo "  Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "══════════════════════════════════════════"
          # ponytail: placeholder for actual deployment command
          echo "Deploy command goes here"
