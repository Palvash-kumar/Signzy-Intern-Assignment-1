apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-orchestrator
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: api-orchestrator.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-orchestrator
                port:
                  number: 80
