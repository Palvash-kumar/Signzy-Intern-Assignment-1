apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-server
  labels:
    app: mock-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-server
  template:
    metadata:
      labels:
        app: mock-server
    spec:
      containers:
        - name: mock-server
          image: ghcr.io/palvash-kumar/api-orchestrator:latest
          command: ["node", "src/mock/mock-server.js"]
          ports:
            - containerPort: 4000
          env:
            - name: MOCK_SERVER_PORT
              value: "4000"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mock-server
  labels:
    app: mock-server
spec:
  type: ClusterIP
  selector:
    app: mock-server
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      name: http
